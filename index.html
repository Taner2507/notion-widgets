<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notion Widget Starter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="widget-shell">
    <section class="widget-card" aria-label="Daily focus widget">
      <p class="eyebrow">Notion Embed Widget</p>
      <h1 id="todayLabel" class="title">Today</h1>
      <div class="time-row">
        <span id="clock" class="clock">00:00</span>
        <span id="period" class="period">AM</span>
      </div>
      <p id="dateText" class="date-text">Thursday, March 19</p>
      <div class="divider"></div>
      <div class="focus-panel">
        <p class="focus-label">Focus Prompt</p>
        <p id="focusText" class="focus-text">Pick one meaningful task and finish it before opening anything new.</p>
      </div>
      <button id="shuffleButton" class="shuffle-button" type="button">New prompt</button>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
